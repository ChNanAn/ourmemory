<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Memory Life</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <div class="soft-hearts" aria-hidden="true">
      <span></span>
      <span></span>
      <span></span>
      <span></span>
    </div>
    <div class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Memory Life</p>
          <h1>生活记录册</h1>
        </div>
        <nav class="tabs" aria-label="页面导航">
          <button class="tab active" data-view="home">首页</button>
          <button class="tab" data-view="food">美食</button>
          <button class="tab" data-view="travel">旅行</button>
          <button class="tab" data-view="hobby">爱好</button>
          <button class="tab" data-view="wish">愿望</button>
          <button class="tab" data-view="about">小记</button>
        </nav>
      </header>

      <main>
        <section class="view active" id="home-view">
          <section class="home-hero" aria-label="首页封面">
            <div class="home-hero-copy">
              <h2>和朵朵有关的小日子。</h2>
              <p>从 2.15 开始，慢慢记录生活。</p>
            </div>
          </section>

          <div class="home-sections">
            <section class="home-section">
              <div class="section-head">
                <h2>最近美食</h2>
                <button class="text-button" type="button" data-jump-view="food">去看看</button>
              </div>
              <div class="home-card-list" id="home-food-list"></div>
            </section>
            <section class="home-section">
              <div class="section-head">
                <h2>旅行</h2>
                <button class="text-button" type="button" data-jump-view="travel">去看看</button>
              </div>
              <div class="home-card-list" id="home-travel-list"></div>
            </section>
            <section class="home-section">
              <div class="section-head">
                <h2>愿望</h2>
                <button class="text-button" type="button" data-jump-view="wish">去看看</button>
              </div>
              <div class="home-wish-list" id="home-wish-list"></div>
            </section>
          </div>
        </section>

        <section class="view" id="about-view">
          <section class="about-panel about-page-panel">
            <div>
              <p class="eyebrow">小记</p>
              <h2>把小日子轻轻收好。</h2>
              <p>2.15 那天开始的小缘分，还在继续。美食、旅行、爱好和愿望，都慢慢放在这里。</p>
            </div>
            <div class="anniversary-card">
              <p>认识第 <strong id="known-days">0</strong> 天</p>
              <span>距离下一个 2.15 还有 <strong id="next-anniversary-days">0</strong> 天</span>
            </div>
          </section>
        </section>

        <section class="view" id="food-view">
          <div class="two-column">
            <form class="panel form-panel" id="food-form">
              <h2 id="food-form-title">新增美食</h2>
              <input name="id" type="hidden" />
              <input name="existingImages" type="hidden" />
              <label>店名或食物<input name="title" required maxlength="120" /></label>
              <label>位置<input name="location" maxlength="160" /></label>
              <label>评分<input name="rating" type="number" min="1" max="5" placeholder="1-5" /></label>
              <label>图片<input name="imageFiles" type="file" accept="image/*" multiple /></label>
              <div class="image-manager" data-image-manager="food-form"></div>
              <label>简短描述<textarea name="note" rows="4"></textarea></label>
              <div class="form-actions">
                <button class="primary-button" type="submit">保存美食</button>
                <button class="secondary-button" type="button" data-reset-form="food-form">取消编辑</button>
              </div>
            </form>
            <div class="record-grid" id="food-list"></div>
          </div>
        </section>

        <section class="view" id="travel-view">
          <div class="two-column">
            <form class="panel form-panel" id="travel-form">
              <h2 id="travel-form-title">新增旅行</h2>
              <input name="id" type="hidden" />
              <input name="existingImages" type="hidden" />
              <label>城市或地点<input name="city" required maxlength="120" /></label>
              <label>日期<input name="date" type="date" /></label>
              <label>照片<input name="imageFiles" type="file" accept="image/*" multiple /></label>
              <div class="image-manager" data-image-manager="travel-form"></div>
              <label>照片/文件说明<textarea name="photo_note" rows="3" placeholder="比如：照片拍摄地点、路线、票据或文件备注"></textarea></label>
              <label>故事<textarea name="story" rows="5"></textarea></label>
              <div class="form-actions">
                <button class="primary-button" type="submit">保存旅行</button>
                <button class="secondary-button" type="button" data-reset-form="travel-form">取消编辑</button>
              </div>
            </form>
            <div class="timeline" id="travel-list"></div>
          </div>
        </section>

        <section class="view" id="hobby-view">
          <div class="two-column">
            <form class="panel form-panel" id="hobby-form">
              <h2 id="hobby-form-title">新增爱好</h2>
              <input name="id" type="hidden" />
              <input name="existingImages" type="hidden" />
              <label>爱好名称<input name="title" required maxlength="120" placeholder="比如：拍照灵感" /></label>
              <label>分类<input name="category" maxlength="80" placeholder="旗袍 / 种花 / 画画 / 运动" /></label>
              <label>和朵朵有关的点<input name="duoduo_element" maxlength="180" placeholder="比如：朵朵提过 / 一起试过" /></label>
              <label>图片<input name="imageFiles" type="file" accept="image/*" multiple /></label>
              <div class="image-manager" data-image-manager="hobby-form"></div>
              <label>备注<textarea name="note" rows="4" placeholder="记录一点细节"></textarea></label>
              <div class="form-actions">
                <button class="primary-button" type="submit">保存爱好</button>
                <button class="secondary-button" type="button" data-reset-form="hobby-form">取消编辑</button>
              </div>
            </form>
            <div class="record-grid" id="hobby-list"></div>
          </div>
        </section>

        <section class="view" id="wish-view">
          <div class="wish-layout">
            <form class="panel wish-form" id="wish-form">
              <input name="id" type="hidden" />
              <input name="content" required maxlength="240" placeholder="想一起完成什么？" />
              <button class="primary-button" type="submit">添加</button>
            </form>
            <div class="wish-list" id="wish-list"></div>
          </div>
        </section>
      </main>
      <footer class="footer-note">给朵朵，也给慢慢变好的每一天。</footer>
    </div>

    <template id="empty-template">
      <div class="empty-state">还没有记录，先添加一条。</div>
    </template>

    <script src="/static/app.js"></script>
  </body>
</html>
